<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Balatro X" />
    <link rel="apple-touch-icon" href="/icon.svg" sizes="512x512" />
    <link rel="manifest" href="/manifest.json" />
    <title>Balatro Extreme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        width: 100%;
        height: 100%;
        /* iOS Safari: use -webkit-fill-available to get the real visible height */
        height: -webkit-fill-available;
        background: #1c1930;
        overflow: hidden;
      }
      body {
        width: 100%;
        height: 100%;
        height: -webkit-fill-available;
        background: #1c1930;
        overflow: hidden;
      }
      #game-container {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
      }
      canvas { display: block; touch-action: none; }

      /* Portrait-mode overlay — ask user to rotate */
      #rotate-prompt {
        display: none;
        position: fixed; inset: 0; z-index: 9999;
        background: #1c1930;
        flex-direction: column; align-items: center; justify-content: center;
        color: #aaaacc; font-family: 'Nunito', monospace;
        font-size: 18px; text-align: center; gap: 20px; padding: 32px;
      }
      .rotate-icon {
        font-size: 60px;
        animation: rotate-spin 2.5s linear infinite;
        display: block;
      }
      @keyframes rotate-spin { to { transform: rotate(360deg); } }
      @media (orientation: portrait) {
        #rotate-prompt { display: flex; }
        #game-container { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="rotate-prompt">
      <span class="rotate-icon">⟳</span>
      <p>Rotate your device to landscape<br>for the best experience</p>
    </div>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
