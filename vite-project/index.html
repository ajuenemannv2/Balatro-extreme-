<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Balatro X" />
    <link rel="apple-touch-icon" href="/icon.svg" sizes="512x512" />
    <link rel="manifest" href="/manifest.json" />
    <title>Balatro Extreme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        width: 100%;
        height: 100%;
        /* iOS Safari: use -webkit-fill-available to get the real visible height */
        height: -webkit-fill-available;
        background: #1c1930;
        overflow: hidden;
      }
      body {
        width: 100%;
        height: 100%;
        height: -webkit-fill-available;
        background: #1c1930;
        overflow: hidden;
      }
      #game-container {
        width: 100%;
        height: 100%;
      }
      canvas { display: block; touch-action: none; }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
